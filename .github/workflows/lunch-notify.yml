name: Lunsjvarsel Teams

on:
  schedule:
    # 08:00 UTC mandag = 10:00 norsk sommertid (09:00 vintertid).
    # Vi sikter mot 10:00 norsk tid for å gi god margin før lunsj
    # selv hvis GitHub Actions er forsinket (vanligvis 5-30 min).
    - cron: "17 8 * * 1"
  workflow_dispatch:

jobs:
  send-lunch-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Hent kildekoden
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Kjor lunsjvarselet
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          GIPHY_API_KEY: ${{ secrets.GIPHY_API_KEY }}
          USERS_JSON: ${{ secrets.USERS_JSON }}
          ROTATION_JSON: ${{ secrets.ROTATION_JSON }}
        run: python lunch_notify.py
