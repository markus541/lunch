name: Lunsjvarsel – Teams

on:
  schedule:
    # Kjører hver mandag kl. 10:00 norsk tid (08:00 UTC / sommertid)
    - cron: "0 8 * * 1"

  # Manuell kjøring for testing
  workflow_dispatch:

jobs:
  send-lunch-notification:
    runs-on: ubuntu-latest

    steps:
      - name: Hent kildekoden
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Kjør lunsjvarselet
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          GIPHY_API_KEY: ${{ secrets.GIPHY_API_KEY }}   # Valgfritt – GIF utelates hvis ikke satt
        run: python lunch_notify.py

