name: Lunsjvarsel Teams

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  send-lunch-notification:
    runs-on: ubuntu-latest

    steps:
      - name: Hent kildekoden
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Kjor lunsjvarselet
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          GIPHY_API_KEY: ${{ secrets.GIPHY_API_KEY }}
        run: python lunch_notify.py
